<div class="container-fluid main-container">
  <mat-tab-group
    class="custom-tab-group"
    dynamicHeight
    mat-align-tabs="center"
    mat-stretch-tabs="false"
  >

    <!-- Account Details -->
    <mat-tab label="Account details">
      <div class="tab-content">
        <app-account-info
          [sessionsTotal]="sessions.length"
          [days]="daysList"
          [count]="count">
        </app-account-info>
      </div>
    </mat-tab>

    <!-- User Details -->
    <mat-tab label="User details">
      <div class="tab-content">
        <p>This is the content for the second tab.</p>
      </div>
    </mat-tab>

    <!-- Login History -->
    <mat-tab label="Login history">
      <div class="tab-content">
        <app-login-history
          (sentSessions)="setSessions($event)">
        </app-login-history>
      </div>
    </mat-tab>

  </mat-tab-group>
</div>
