<div class="container-fluid main-container">

  <mat-list>

    <!-- Greeting -->
    <mat-list-item>
      <h1 class="text-center w-100">Hello {{ userInfo.firstName }}</h1>
    </mat-list-item>

    <!-- User Name -->
    <mat-list-item>
      <h2 class="text-center w-100 info">
        {{ userInfo.firstName }}
      </h2>
    </mat-list-item>

    <!-- Email -->
    <mat-list-item>
      <h2 class="text-center w-100 info">
        {{ userInfo.email }}
      </h2>
    </mat-list-item>

    <mat-divider></mat-divider>

    <!-- Role -->
    <mat-list-item>
      <h2 class="text-center w-100 role info">
        {{ role }}
      </h2>
    </mat-list-item>

    <mat-divider></mat-divider>

    <!-- Total Logins -->
    <mat-list-item>
      <h2 class="text-center w-100 role info">
        Total of logins: {{ sessionsTotal }}
      </h2>
    </mat-list-item>

    <mat-divider></mat-divider>

  </mat-list>


  <!-- Action Buttons -->
  <div class="container text-center mt-4">
    <div class="row">

      <div class="col mb-3">
        <button
          mat-fab
          extended
          color="primary"
          class="custom-btn"
          (click)="openUpdateUser()">

          <mat-icon>update</mat-icon>
          Update Information

        </button>
      </div>

      <div class="col mb-3">
        <button
          mat-fab
          extended
          color="warn"
          class="custom-btn"
          (click)="openDeleteDialog()">

          <mat-icon>delete</mat-icon>
          <span class="ms-2">Delete Account</span>

        </button>
      </div>

      <div class="col mb-3">
        <button
          mat-fab
          extended
          color="accent"
          class="custom-btn"
          (click)="openChangePassword()">

          <mat-icon>lock</mat-icon>
          Update Password

        </button>
      </div>

    </div>
  </div>

</div>
